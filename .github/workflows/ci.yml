name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, types, tests, coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff, strict ruleset)
        run: ruff check app.py core/ tests/

      - name: Format check (ruff)
        run: ruff format --check app.py core/ tests/

      - name: Type check (mypy --strict)
        run: mypy

      - name: Tests with coverage gate
        run: pytest --cov=core --cov-report=term-missing --cov-fail-under=100
