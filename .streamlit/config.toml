[theme]
base = "dark"
primaryColor = "#34d399"
backgroundColor = "#0b1120"
secondaryBackgroundColor = "#151e32"
textColor = "#e6edf7"
font = "sans serif"

[browser]
gatherUsageStats = false

[server]
# Don't auto-rerun on source-file changes — prevents the app refreshing mid-interaction.
runOnSave = false
